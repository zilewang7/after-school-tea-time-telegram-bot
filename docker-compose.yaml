services:
  k-on-bot:
    container_name: k-on-bot
    restart: always
    build:
      context: .
      args:
        - GIT_REPO=https://github.com/zilewang7/after-school-tea-time-telegram-bot.git
    env_file:
      - ./.env
    environment:
      - GIT_REPO=https://github.com/zilewang7/after-school-tea-time-telegram-bot.git
      - BOT_PROXY=socks5h://warp:1080
      - TZ=Asia/Shanghai
      - TGS_CONVERTER_URL=http://tgs-converter:8080
      # --- Large media (all optional; empty → current behavior, see .env) ---
      # Local Bot API server: raises getFile to 200MB. Set in .env to
      # http://telegram-bot-api:8081, then: docker compose --profile bigfile up -d
      - TG_LOCAL_API_ROOT=${TG_LOCAL_API_ROOT:-}
      # Full Vertex + GCS for >20MB media (gs:// refs). Empty → express + inline.
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-global}
      - GCS_BUCKET=${GCS_BUCKET:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/k-on-bot/gcp-sa.json
      # Link previews via luoxu's MTProto client (empty → feature off).
      - LUOXU_PREVIEW_URL=${LUOXU_PREVIEW_URL:-}
    volumes:
      - ./database.sqlite:/app/k-on-bot/database.sqlite
      - ./.env:/app/k-on-bot/.env:ro
      # Service account JSON for Vertex/GCS (an empty placeholder is fine until used).
      - ./gcp-sa.json:/app/k-on-bot/gcp-sa.json:ro
      # Shared with telegram-bot-api so k-on-bot can read files downloaded to disk.
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    command: ["/bin/bash", "/app/k-on-bot/build.sh"]
    working_dir: /app/k-on-bot
    networks:
      - traefik-net

  # Dev/test instance (@WatchFirstBot): runs the LOCAL working tree (no git
  # clone), its own node_modules volume (musl vs host glibc), its own sqlite
  # DB and .env.test. Start with: docker compose --profile test up -d k-on-bot-test
  k-on-bot-test:
    container_name: k-on-bot-test
    profiles: ["test"]
    image: node:22-alpine
    env_file:
      - ./.env.test
    environment:
      - BOT_PROXY=socks5h://warp:1080
      - TZ=Asia/Shanghai
      - TGS_CONVERTER_URL=http://tgs-converter:8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/k-on-bot/gcp-sa.json
      - DB_PATH=database.test.sqlite
    volumes:
      - .:/app/k-on-bot
      - k-on-bot-test-node-modules:/app/k-on-bot/node_modules
      # matches the package.json "link:../../projects/telegram-md-entities"
      - /home/ubuntu/projects/telegram-md-entities:/projects/telegram-md-entities:ro
    command:
      [
        "/bin/sh",
        "-c",
        "npm install -g corepack && corepack prepare pnpm@9.4.0 --activate && pnpm install && pnpm build && node dist/index.js",
      ]
    working_dir: /app/k-on-bot
    networks:
      - traefik-net

  # Converts Telegram .tgs animated stickers to .webm for multimodal models.
  # Opt-in via COMPOSE_PROFILES (default includes 'tgs' in .env.example).
  tgs-converter:
    container_name: tgs-converter
    restart: always
    profiles: ["tgs"]
    build:
      context: ./tgs-converter
    environment:
      - TZ=Asia/Shanghai
    networks:
      - traefik-net

  # Self-hosted Telegram Bot API (--local): getFile up to 2GB, returns on-disk
  # paths shared via telegram-bot-api-data. Opt-in via COMPOSE_PROFILES=bigfile in
  # .env — then a plain `docker compose up -d` starts it (no --profile flag needed).
  # Requires TG_API_ID / TG_API_HASH in .env (reuse luoxu's api_id/api_hash).
  telegram-bot-api:
    container_name: telegram-bot-api
    image: aiogram/telegram-bot-api:latest
    restart: always
    profiles: ["bigfile"]
    environment:
      - TELEGRAM_API_ID=${TG_API_ID:-}
      - TELEGRAM_API_HASH=${TG_API_HASH:-}
      - TELEGRAM_LOCAL=1
      - TZ=Asia/Shanghai
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true

volumes:
  telegram-bot-api-data:
  k-on-bot-test-node-modules:
